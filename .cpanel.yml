---
# cPanel deployment recipe.
#
# Three concerns:
#   1. Rsync the working copy into the subdomain docroot.
#   2. Set directory/file permissions to what cPanel + LiteSpeed expect (755/644).
#      rsync runs with --no-perms, so dirs auto-created by rsync inherit the
#      cPanel git-deploy umask, which can be too restrictive for Apache to
#      traverse — that exact bug ate our first deploy and surfaced as a
#      mysterious 404 on every URL.
#   3. Touch the .php files so the opcode cache picks up the new versions.
#
# IMPORTANT: each command stays on ONE PHYSICAL LINE — YAML's folded scalar
# preserves newlines on more-indented continuations and silently corrupts
# deploys.
deployment:
  tasks:
    - /usr/bin/rsync -av --checksum --no-perms --omit-dir-times --exclude='.git/' --exclude='.github/' --exclude='.gitignore' --exclude='.cpanel.yml' --exclude='README.md' --exclude='CICD.md' --exclude='DEPLOY.md' --exclude='includes/config.php' --exclude='last-deploy.log' ./ $HOME/thelittlegraduates.in/mtt/ > $HOME/last-mtt-deploy.log 2>&1
    - /bin/chmod 755 $HOME/thelittlegraduates.in $HOME/thelittlegraduates.in/mtt
    - /usr/bin/find $HOME/thelittlegraduates.in/mtt -type d -exec /bin/chmod 755 {} +
    - /usr/bin/find $HOME/thelittlegraduates.in/mtt -type f -exec /bin/chmod 644 {} +
    - /usr/bin/find $HOME/thelittlegraduates.in/mtt -name '*.php' -exec /usr/bin/touch {} +
    - /bin/cp $HOME/last-mtt-deploy.log $HOME/thelittlegraduates.in/mtt/last-deploy.log
