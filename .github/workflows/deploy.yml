name: Deploy to Hostgator (cPanel pull)

# Unified Little Graduates app — cPanel pulls main directly. No build step,
# no deploy branch — PHP runs from source.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-hostgator-lg
  cancel-in-progress: false

jobs:
  lint:
    name: PHP syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: none

      - name: php -l on every .php file
        run: |
          set -e
          find . -path ./.git -prune -o -name '*.php' -print | while read -r f; do
            php -l "$f" >/dev/null
          done

  deploy:
    name: Trigger cPanel git-pull and deploy
    needs: lint
    runs-on: ubuntu-latest
    env:
      CPANEL_HOST:  ${{ secrets.CPANEL_HOST }}
      CPANEL_USER:  ${{ secrets.CPANEL_USER }}
      CPANEL_TOKEN: ${{ secrets.CPANEL_TOKEN }}
      REPO_ROOT:    /home/${{ secrets.CPANEL_USER }}/repos/MontessoriTraineeTeacher
    steps:
      - name: Normalise CPANEL_HOST (strip scheme / trailing slash)
        run: |
          HOST=$(printf '%s' "${CPANEL_HOST}" | sed -E 's#^https?://##; s#/+$##')
          echo "::add-mask::${HOST}"
          echo "CPANEL_HOST_CLEAN=${HOST}" >> "$GITHUB_ENV"

      - name: 1/2 — cPanel git fetch + reset to main
        run: |
          set -e
          curl -sS --fail-with-body -X POST \
            "https://${CPANEL_HOST_CLEAN}:2083/execute/VersionControl/update" \
            -H "Authorization: cpanel ${CPANEL_USER}:${CPANEL_TOKEN}" \
            --data-urlencode "repository_root=${REPO_ROOT}" \
            --data-urlencode "branch=main" \
            | tee /tmp/pull.json
          jq -e '.status == 1' /tmp/pull.json > /dev/null || (cat /tmp/pull.json; exit 1)

      - name: 2/3 — cPanel run .cpanel.yml (rsync into docroot)
        run: |
          set -e
          curl -sS --fail-with-body -X POST \
            "https://${CPANEL_HOST_CLEAN}:2083/execute/VersionControlDeployment/create" \
            -H "Authorization: cpanel ${CPANEL_USER}:${CPANEL_TOKEN}" \
            --data-urlencode "repository_root=${REPO_ROOT}" \
            | tee /tmp/deploy.json
          jq -e '.status == 1' /tmp/deploy.json > /dev/null || (cat /tmp/deploy.json; exit 1)

      - name: 3/3 — Self-test the unified login URL
        run: |
          set +e
          URL="https://mtt.thelittlegraduates.in/login.php"
          # cPanel rsync needs a beat to settle the docroot.
          sleep 6

          # Diagnostics first — if curl's "couldn't connect" hits again we want
          # the workflow log to show whether it was DNS, TCP, or TLS.
          echo "--- DNS lookup ---"
          getent hosts mtt.thelittlegraduates.in || echo "(getent failed)"
          echo "--- TCP probe ---"
          timeout 5 bash -c '</dev/tcp/mtt.thelittlegraduates.in/443' \
              && echo "TCP/443 reachable" \
              || echo "TCP/443 unreachable"

          # Retry with backoff so a transient hostgator hiccup right after the
          # rsync doesn't fail the whole workflow. --retry-all-errors picks up
          # exit 7 (connect failed) and exit 28 (timeout), not just HTTP 5xx.
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" \
            --connect-timeout 10 --max-time 30 \
            --retry 5 --retry-delay 6 --retry-all-errors \
            "${URL}?_=$(date +%s)")
          echo "GET /login.php → HTTP $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "302" ]; then
            echo "::error::Live URL returned $STATUS — the deploy looks complete but the URL is dead."
            echo "::error::Check ~/last-mtt-deploy.log on the server and verify file permissions (dirs 755, files 644)."
            exit 1
          fi
          echo "::notice::Site is live."
