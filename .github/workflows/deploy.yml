name: Deploy to Hostgator (cPanel pull)

# Mirrors the LGTaskManager pipeline. cPanel pulls main directly — no build
# step, no deploy branch — because PHP runs from source.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-hostgator-mtt
  cancel-in-progress: false

jobs:
  lint:
    name: PHP syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: none

      - name: php -l on every .php file
        run: |
          set -e
          find . -path ./.git -prune -o -name '*.php' -print | while read -r f; do
            php -l "$f" >/dev/null
          done

  deploy:
    name: Trigger cPanel git-pull and deploy
    needs: lint
    runs-on: ubuntu-latest
    env:
      CPANEL_HOST:  ${{ secrets.CPANEL_HOST }}
      CPANEL_USER:  ${{ secrets.CPANEL_USER }}
      CPANEL_TOKEN: ${{ secrets.CPANEL_TOKEN }}
      REPO_ROOT:    /home/${{ secrets.CPANEL_USER }}/repos/MontessoriTraineeTeacher
    steps:
      - name: Normalise CPANEL_HOST (strip scheme / trailing slash)
        run: |
          HOST=$(printf '%s' "${CPANEL_HOST}" | sed -E 's#^https?://##; s#/+$##')
          echo "::add-mask::${HOST}"
          echo "CPANEL_HOST_CLEAN=${HOST}" >> "$GITHUB_ENV"

      - name: 0/2 — DEBUG resolve mtt subdomain's docroot via legacy api2
        run: |
          set -e
          # Modern UAPI 'WebVhosts/list_domains' would also work, but Hostgator
          # often retains the legacy api2 SubDomain/listsubdomains which is
          # known to include 'dir' and 'reldir' fields directly.
          curl -sS -X POST \
            "https://${CPANEL_HOST_CLEAN}:2083/json-api/cpanel?cpanel_jsonapi_module=SubDomain&cpanel_jsonapi_func=listsubdomains&cpanel_jsonapi_apiversion=2" \
            -H "Authorization: cpanel ${CPANEL_USER}:${CPANEL_TOKEN}" \
            --data "" \
            > /tmp/sd.json
          echo "=== api2 SubDomain.listsubdomains ==="
          jq '.cpanelresult.data[] | select(.domain | test("mtt";"i"))' /tmp/sd.json || true
          echo
          echo "=== UAPI WebVhosts/list_domains ==="
          curl -sS -X POST \
            "https://${CPANEL_HOST_CLEAN}:2083/execute/WebVhosts/list_domains" \
            -H "Authorization: cpanel ${CPANEL_USER}:${CPANEL_TOKEN}" \
            --data "" \
            > /tmp/wv.json || true
          jq '.data[] | select(.domain | test("mtt";"i"))' /tmp/wv.json || true
          echo
          echo "=== Try userdata directly ==="
          curl -sS -X POST \
            "https://${CPANEL_HOST_CLEAN}:2083/execute/UserDataGeneral/load_user_domain_data?domain=mtt.thelittlegraduates.in" \
            -H "Authorization: cpanel ${CPANEL_USER}:${CPANEL_TOKEN}" \
            --data "" \
            | jq '.'

      - name: 1/2 — cPanel git fetch + reset to main
        run: |
          set -e
          curl -sS --fail-with-body -X POST \
            "https://${CPANEL_HOST_CLEAN}:2083/execute/VersionControl/update" \
            -H "Authorization: cpanel ${CPANEL_USER}:${CPANEL_TOKEN}" \
            --data-urlencode "repository_root=${REPO_ROOT}" \
            --data-urlencode "branch=main" \
            | tee /tmp/pull.json
          jq -e '.status == 1' /tmp/pull.json > /dev/null || (cat /tmp/pull.json; exit 1)

      - name: 2/2 — cPanel run .cpanel.yml (rsync into docroot)
        run: |
          set -e
          curl -sS --fail-with-body -X POST \
            "https://${CPANEL_HOST_CLEAN}:2083/execute/VersionControlDeployment/create" \
            -H "Authorization: cpanel ${CPANEL_USER}:${CPANEL_TOKEN}" \
            --data-urlencode "repository_root=${REPO_ROOT}" \
            | tee /tmp/deploy.json
          jq -e '.status == 1' /tmp/deploy.json > /dev/null || (cat /tmp/deploy.json; exit 1)
