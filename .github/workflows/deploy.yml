name: Deploy to Hostgator (cPanel pull)

# Unified Little Graduates app — cPanel pulls main directly. No build step,
# no deploy branch — PHP runs from source.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-hostgator-lg
  cancel-in-progress: false

jobs:
  lint:
    name: PHP syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: none

      - name: php -l on every .php file
        run: |
          set -e
          find . -path ./.git -prune -o -name '*.php' -print | while read -r f; do
            php -l "$f" >/dev/null
          done

  deploy:
    name: Trigger cPanel git-pull and deploy
    needs: lint
    runs-on: ubuntu-latest
    env:
      CPANEL_HOST:  ${{ secrets.CPANEL_HOST }}
      CPANEL_USER:  ${{ secrets.CPANEL_USER }}
      CPANEL_TOKEN: ${{ secrets.CPANEL_TOKEN }}
      REPO_ROOT:    /home/${{ secrets.CPANEL_USER }}/repos/MontessoriTraineeTeacher
    steps:
      - name: Normalise CPANEL_HOST (strip scheme / trailing slash)
        run: |
          HOST=$(printf '%s' "${CPANEL_HOST}" | sed -E 's#^https?://##; s#/+$##')
          echo "::add-mask::${HOST}"
          echo "CPANEL_HOST_CLEAN=${HOST}" >> "$GITHUB_ENV"

      - name: 1/2 — cPanel git fetch + reset to main
        run: |
          set -e
          curl -sS --fail-with-body -X POST \
            "https://${CPANEL_HOST_CLEAN}:2083/execute/VersionControl/update" \
            -H "Authorization: cpanel ${CPANEL_USER}:${CPANEL_TOKEN}" \
            --data-urlencode "repository_root=${REPO_ROOT}" \
            --data-urlencode "branch=main" \
            | tee /tmp/pull.json
          jq -e '.status == 1' /tmp/pull.json > /dev/null || (cat /tmp/pull.json; exit 1)

      - name: 2/3 — cPanel run .cpanel.yml (rsync into docroot)
        run: |
          set -e
          curl -sS --fail-with-body -X POST \
            "https://${CPANEL_HOST_CLEAN}:2083/execute/VersionControlDeployment/create" \
            -H "Authorization: cpanel ${CPANEL_USER}:${CPANEL_TOKEN}" \
            --data-urlencode "repository_root=${REPO_ROOT}" \
            | tee /tmp/deploy.json
          jq -e '.status == 1' /tmp/deploy.json > /dev/null || (cat /tmp/deploy.json; exit 1)

      - name: 3/3 — Self-test the unified login URL
        run: |
          set +e
          URL="https://mtt.thelittlegraduates.in/login.php"
          # cPanel rsync needs a beat to settle the docroot.
          sleep 6

          # Diagnostics first — if curl's "couldn't connect" hits again we want
          # the workflow log to show whether it was DNS, TCP, or TLS.
          echo "--- DNS lookup ---"
          getent hosts mtt.thelittlegraduates.in || echo "(getent failed)"
          echo "--- TCP probe ---"
          timeout 5 bash -c '</dev/tcp/mtt.thelittlegraduates.in/443' \
              && echo "TCP/443 reachable" \
              || echo "TCP/443 unreachable"

          # Retry with backoff so a transient hostgator hiccup right after the
          # rsync doesn't fail the whole workflow. --retry-all-errors picks up
          # exit 7 (connect failed) and exit 28 (timeout), not just HTTP 5xx.
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" \
            --connect-timeout 10 --max-time 30 \
            --retry 5 --retry-delay 6 --retry-all-errors \
            "${URL}?_=$(date +%s)")
          echo "GET /login.php → HTTP $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "302" ]; then
            echo "::error::Live URL returned $STATUS — the deploy looks complete but the URL is dead."
            echo "::error::Check ~/last-mtt-deploy.log on the server and verify file permissions (dirs 755, files 644)."
            exit 1
          fi

          # Boot-check the public parent form: a malformed token must render
          # the "Link not active" page (HTTP 404). A 500 here means the page
          # can't even bootstrap (missing include, unapplied migration — both
          # have happened) and parents holding real links would see errors.
          PF_URL="https://mtt.thelittlegraduates.in/students/parent_form.php?token=deploy-smoke"
          PF_STATUS=$(curl -sS -o /dev/null -w "%{http_code}" \
            --connect-timeout 10 --max-time 30 \
            --retry 3 --retry-delay 5 --retry-all-errors \
            "${PF_URL}&_=$(date +%s)")
          echo "GET /students/parent_form.php (bad token) → HTTP $PF_STATUS"
          if [ "$PF_STATUS" != "404" ]; then
            echo "::error::Parent form returned $PF_STATUS (expected 404 'Link not active')."
            echo "::error::A 500 usually means a missing include or an unapplied migration — check /last-migrate.log on the site."
            exit 1
          fi

          # ----- Inventory boot check + migration confirmation ----------------
          # Pulls the published migration log + walks every inventory route
          # the master-spec UI exposes. A 5xx (or the friendly-error marker)
          # fails the deploy with a pointer at /last-migrate.log.
          BASE="https://mtt.thelittlegraduates.in"
          echo "--- /last-migrate.log tail ---"
          MIG=$(curl -sS --fail-with-body --max-time 30 "$BASE/last-migrate.log?_=$(date +%s)") \
              || { echo "::error::could not fetch /last-migrate.log"; exit 1; }
          echo "$MIG" | tail -80
          if ! echo "$MIG" | grep -q "migrate_031_inventory_extras.sql"; then
            echo "::error::migrate_031 not mentioned in /last-migrate.log"
            exit 1
          fi
          if ! echo "$MIG" | awk '/migrate_031_inventory_extras\.sql/{f=1; next} f && /applied/{ok=1; exit} f && /───/{exit} END{exit !ok}'; then
            echo "::error::migrate_031 line not followed by 'applied'"
            exit 1
          fi
          echo "::notice::Migration 031 ✓ applied on the live DB."

          INV_FAIL=0
          for path in \
              "/inventory/index.php" \
              "/inventory/index.php?view=low" \
              "/inventory/index.php?view=due" \
              "/inventory/index.php?view=attention" \
              "/inventory/index.php?format=csv" \
              "/inventory/edit.php" \
              "/inventory/reports.php"; do
            # Append a cache-buster, picking & or ? based on the path itself.
            case "$path" in *\?*) SEP="&" ;; *) SEP="?" ;; esac
            URL="$BASE$path${SEP}_=$(date +%s)"
            S=$(curl -sS -o /tmp/inv_body -w "%{http_code}" --max-time 20 "$URL")
            echo "  $S  $path"
            # Non-auth'd hits must redirect to login (302/303). 200 is also
            # accepted — happens when the page renders the friendly error,
            # which is then caught by the grep below. 404/5xx fail the deploy.
            case "$S" in
              200|301|302|303) : ;;
              *) echo "::error::$path returned $S (expected 302 to /login.php)"; head -c 600 /tmp/inv_body; INV_FAIL=1 ;;
            esac
            if grep -q "Something went wrong" /tmp/inv_body 2>/dev/null; then
              echo "::error::$path rendered the friendly error page"
              INV_FAIL=1
            fi
          done
          [ $INV_FAIL -eq 0 ] || exit 1

          # ----- Inventory master-spec assertions (runs on the cPanel host) ---
          # .cpanel.yml curls inventory/smoke_internal.php from 127.0.0.1 after the
          # rsync + migrate. The endpoint is IP-gated so only the host
          # itself can hit it. We read the captured output here and fail
          # the deploy if any assertion failed.
          SMOKE=$(curl -sS --max-time 30 "$BASE/last-smoke.log?_=$(date +%s)") \
              || { echo "::error::could not fetch /last-smoke.log"; exit 1; }
          echo "--- /last-smoke.log ---"
          printf '%s\n' "$SMOKE"
          # PASS may not be on the first line (the wrapper prints the HTTP
          # loopback banner first, then the CLI-fallback PASS). Grep for the
          # PASS marker anywhere in the log; FAIL anywhere fails the deploy.
          if printf '%s' "$SMOKE" | grep -qE '^FAIL'; then
              echo "::error::inventory master-spec smoke reported FAIL"
              exit 1
          fi
          if ! printf '%s' "$SMOKE" | grep -qE '^PASS'; then
              echo "::error::inventory master-spec smoke did NOT pass (no PASS marker in /last-smoke.log)"
              exit 1
          fi
          echo "::notice::Site is live (login + parent form + inventory boot OK; migration 031 applied; master-spec smoke ✓)."

      - name: 4/4 — Authed inventory integration test (skips without credentials)
        env:
          BASE: https://mtt.thelittlegraduates.in
          SMOKE_TEST_USER_ID: ${{ secrets.SMOKE_TEST_USER_ID }}
          SMOKE_TEST_PIN:     ${{ secrets.SMOKE_TEST_PIN }}
        run: |
          bash .github/scripts/smoke-inventory.sh
